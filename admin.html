<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirruba Admin Dashboard</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bg: #f5f7fb;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #e5e7eb;
            --card: #ffffff;
            --primary: #111827;
            --accent: #d4a956;
            --accent-soft: #f8f1e2;
            --danger: #dc3545;
            --danger-hover: #bb2d3b;
            --info: #2563eb;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #ffffff, var(--bg) 45%);
            margin: 0;
            padding: 24px;
            color: var(--text);
        }

        .container {
            max-width: 1140px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
            padding: 18px 20px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(17, 24, 39, 0.05);
        }

        .page-title {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .page-subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        @media (max-width: 860px) {
            body { padding: 14px; }
            .grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(17, 24, 39, 0.04);
        }

        .panel h2 {
            margin: 0 0 14px;
            font-size: 18px;
        }

        .form-group { margin-bottom: 13px; }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
        }

        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color .2s, box-shadow .2s;
            background: #fff;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 169, 86, 0.2);
            outline: none;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px dashed #d1d5db;
            border-radius: 10px;
            background: #fafafa;
        }

        button {
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s ease;
            padding: 10px 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }
        .btn-primary:hover { opacity: 0.92; }

        .btn-secondary {
            background: #6b7280;
            color: white;
            margin-top: 10px;
            width: 100%;
        }
        .btn-secondary:hover { background: #4b5563; }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 8px 12px;
            font-size: 13px;
        }
        .btn-danger:hover { background: var(--danger-hover); }

        .btn-edit {
            background: var(--info);
            color: white;
            padding: 8px 12px;
            font-size: 13px;
            margin-right: 5px;
        }
        .btn-edit:hover { background: #1d4ed8; }

        .product-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 640px;
            overflow-y: auto;
        }

        .product-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 12px;
            margin-bottom: 10px;
            background: #fff;
        }

        .product-item img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 12px;
            border: 1px solid #eee;
        }

        .product-info { flex-grow: 1; min-width: 0; }
        .product-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .product-price {
            color: #b7791f;
            font-weight: 700;
            background: var(--accent-soft);
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 13px;
        }

        .message {
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
            border: 1px solid transparent;
            font-size: 14px;
        }
        .success { background-color: #dcfce7; color: #166534; border-color: #86efac; }
        .error { background-color: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .preview {
            margin-top: 10px;
            max-width: 100%;
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--line);
            display: none;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            text-decoration: none;
            color: #374151;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <div>
            <h1 class="page-title">Admin Dashboard</h1>
            <p class="page-subtitle">Manage products quickly from one place</p>
        </div>
        <button onclick="logout()" class="btn-danger" style="width:auto;">Logout</button>
    </div>
    
    <div class="grid">
        <!-- Left: Product List -->
        <div class="panel">
            <h2>Products List</h2>
            <ul id="productList" class="product-list">
                <!-- Items will be here -->
            </ul>
        </div>

        <!-- Right: Form -->
        <div class="panel">
            <h2 id="formTitle">Add New Product</h2>
            <form id="productForm">
                <input type="hidden" id="product_id" name="product_id">
                
                <div class="form-group">
                    <label for="title">Product Name</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" name="price" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="category_id">Category</label>
                    <select id="category_id" name="category_id" required>
                        <!-- Categories here -->
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="image">Product Image <span id="imageReq">(Required for New)</span></label>
                    <input type="file" id="image" name="image" accept="image/*">
                    <img id="imagePreview" class="preview" alt="Preview">
                </div>

                <button type="submit" id="submitBtn" class="btn-primary">Add Product</button>
                <button type="button" id="cancelBtn" class="btn-secondary" style="display:none;">Cancel Edit</button>
            </form>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <a href="/" class="nav-link"><i class='bx bx-arrow-back'></i> Back to Website</a>
</div>

<script>
    // Local API
    const API_BASE = '/api';

    let allProducts = [];
    
    // Init
    checkAuth();
    loadCategories();
    loadProducts();

    function checkAuth() {
        const token = localStorage.getItem('admin_token');
        if (!token) {
            window.location.href = 'login.html';
        }
        // Verify token with server
        fetch('/api/admin/verify_token', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': token
            }
        })
        .then(res => res.json())
        .then(data => {
            if (!data.valid) {
                localStorage.removeItem('admin_token');
                window.location.href = 'login.html';
            }
        })
        .catch(() => {
             // If api fails, maybe offline or error, let's keep it simple
        });
    }

    function logout() {
        localStorage.removeItem('admin_token');
        window.location.href = 'login.html';
    }


    // Load Categories
    function loadCategories() {
        fetch('/api/client/category')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('category_id');
                select.innerHTML = '';
                const categories = data.data || [];
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.name;
                    select.appendChild(option);
                });
            })
            .catch(err => console.error("Error loading categories:", err));
    }

    // Load Products
    function loadProducts() {
        fetch('/api/client/product?isPaginate=0')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('productList');
                list.innerHTML = '';
                allProducts = data.data || []; 
                if (data.data && data.data.data) allProducts = data.data.data;

                allProducts.forEach(p => {
                    const li = document.createElement('li');
                    li.className = 'product-item';
                    li.innerHTML = `
                        <div style="display:flex; align-items:center;">
                            <img src="${p.image || '/static/media/placeholder.png'}" alt="img" onerror="this.src='/static/media/placeholder.png'">
                            <div class="product-info">
                                <div class="product-title">${p.title}</div>
                                <div class="product-price">$${p.price}</div>
                            </div>
                        </div>
                        <div>
                            <button class="btn-edit" onclick="editProduct(${p.id})"><i class='bx bx-edit'></i></button>
                            <button class="btn-danger" onclick="deleteProduct(${p.id})"><i class='bx bx-trash'></i></button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            })
            .catch(err => console.error(err));
    }

    // Image Preview
    document.getElementById('image').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('imagePreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    // Form Submit
    document.getElementById('productForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const id = document.getElementById('product_id').value;
        const isEdit = !!id;
        const formData = new FormData(this);
        
        // Validation for new product
        if (!isEdit && document.getElementById('image').files.length === 0) {
            showMessage('Please select an image for new product', false);
            return;
        }

        const url = isEdit ? `./api/admin/edit_product/${id}` : './api/admin/add_product';
        const btn = document.getElementById('submitBtn');
        
        btn.disabled = true;
        btn.textContent = isEdit ? 'Updating...' : 'Adding...';

        try {
            const res = await fetch(url, { method: 'POST', body: formData });
            const result = await res.json();
            
            if (res.ok) { // Local server returns standard HTTP codes
                showMessage(isEdit ? 'Product updated!' : 'Product added!', true);
                if (!isEdit) resetForm(); 
                loadProducts(); 
            } else {
                throw new Error(result.error || 'Operation failed');
            }
        } catch (err) {
            showMessage(err.message, false);
        } finally {
            btn.disabled = false;
            btn.textContent = isEdit ? 'Update Product' : 'Add Product';
        }
    });

    // Edit Handler
    window.editProduct = function(id) {
        const product = allProducts.find(p => p.id == id); // Loose equality for string/int match
        if (!product) return;

        document.getElementById('product_id').value = product.id;
        document.getElementById('title').value = product.title;
        document.getElementById('price').value = product.price;
        document.getElementById('description').value = product.description || '';
        document.getElementById('category_id').value = product.category_id;
        
        // Image preview
        const preview = document.getElementById('imagePreview');
        preview.src = product.image;
        preview.style.display = 'block';

        // UI Changes
        document.getElementById('formTitle').textContent = 'Edit Product';
        document.getElementById('submitBtn').textContent = 'Update Product';
        document.getElementById('cancelBtn').style.display = 'block';
        document.getElementById('imageReq').textContent = '(Optional)';
    };

    // Delete Handler
    window.deleteProduct = async function(id) {
        if (!confirm('Are you sure you want to delete this product?')) return;

        try {
            const res = await fetch(`/api/admin/delete_product/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showMessage('Product deleted!', true);
                loadProducts();
                if (document.getElementById('product_id').value == id) resetForm();
            } else {
                alert('Failed to delete');
            }
        } catch (err) {
            console.error(err);
            alert('Error deleting');
        }
    };

    // Reset Form
    function resetForm() {
        document.getElementById('productForm').reset();
        document.getElementById('product_id').value = '';
        document.getElementById('imagePreview').style.display = 'none';
        
        document.getElementById('formTitle').textContent = 'Add New Product';
        document.getElementById('submitBtn').textContent = 'Add Product';
        document.getElementById('cancelBtn').style.display = 'none';
        document.getElementById('imageReq').textContent = '(Required for New)';
    }

    document.getElementById('cancelBtn').addEventListener('click', resetForm);

    function showMessage(text, isSuccess) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = isSuccess ? 'message success' : 'message error';
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
    }
</script>

</body>
</html>
