(function () {
  function getCartCount() {
    try {
      var raw = localStorage.getItem('cartItems');
      var items = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(items)) return 0;
      var total = 0;
      for (var i = 0; i < items.length; i += 1) {
        var it = items[i] || {};
        var q = Number(it.quantity || it.count || 1);
        if (!Number.isFinite(q) || q < 1) q = 1;
        total += q;
      }
      return total;
    } catch (e) {
      return 0;
    }
  }

  function findCartHost() {
    var icon = document.querySelector('i.bx-cart, i.bx.bx-cart, .pi.pi-shopping-cart, i.pi-shopping-cart');
    if (!icon) return null;
    var host = icon.closest('a,button,div,span') || icon;
    return host;
  }

  function renderBadge() {
    var host = findCartHost();
    if (!host) return;

    var count = getCartCount();
    var badge = host.querySelector('.mirruba-cart-badge');

    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'mirruba-cart-badge';
      badge.style.position = 'absolute';
      badge.style.top = '-8px';
      badge.style.right = '-10px';
      badge.style.minWidth = '18px';
      badge.style.height = '18px';
      badge.style.padding = '0 5px';
      badge.style.borderRadius = '999px';
      badge.style.background = '#d62828';
      badge.style.color = '#fff';
      badge.style.fontSize = '11px';
      badge.style.lineHeight = '18px';
      badge.style.fontWeight = '700';
      badge.style.textAlign = 'center';
      badge.style.zIndex = '9999';
      badge.style.pointerEvents = 'none';
      badge.style.boxShadow = '0 1px 4px rgba(0,0,0,.3)';
      if (getComputedStyle(host).position === 'static') {
        host.style.position = 'relative';
      }
      host.appendChild(badge);
    }

    if (count > 0) {
      badge.textContent = String(count > 99 ? '99+' : count);
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }
  }

  var start = function () {
    // Force Shop link to work
    setInterval(function() {
      var links = document.querySelectorAll('.nav-link');
      for(var i=0; i<links.length; i++) {
        var txt = links[i].textContent.trim().toLowerCase();
        if(txt === 'shop') {
          links[i].href = '/shop';
          links[i].style.cursor = 'pointer';
        }
        if(txt === 'home') {
          links[i].href = '/';
          links[i].style.cursor = 'pointer';
        }
      }
      
      // Fix Mobile Menu Click
      var menuBtn = document.querySelector('.pi-align-justify.Login-place');
      if(menuBtn && !menuBtn.dataset.fixed) {
        menuBtn.style.cursor = 'pointer';
        menuBtn.style.zIndex = '10005';
        menuBtn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var nav = document.querySelector('.navigation');
          if(nav) {
            nav.style.display = (nav.style.display === 'flex') ? 'none' : 'flex';
            nav.classList.toggle('active');
          }
        });
        menuBtn.dataset.fixed = "true";
      }
    }, 1000);

    // Intercept legacy /view links and keep navigation on-site
    document.addEventListener('click', function(e){
      var a = e.target.closest('a');
      if(!a) return;
      var href = a.getAttribute('href') || '';
      if (/^https?:\/\//i.test(href) && href.indexOf(location.host) === -1) return;
      if (/\/view(\/|\\?|$)/.test(href)) {
        e.preventDefault();
        try {
          var u = new URL(href, location.origin);
          var id = u.searchParams.get('id') || u.pathname.split('/').filter(Boolean).pop();
          if (id) location.href = '/product/' + id;
          else location.href = '/shop';
        } catch(_) {
          location.href = '/shop';
        }
      }
    }, true);

    renderBadge();
    setInterval(renderBadge, 700);
    window.addEventListener('storage', renderBadge);
    window.addEventListener('click', function () { setTimeout(renderBadge, 120); });
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }

  // Setup custom language switcher
  function setupLangSwitcher() {
    // Wait for the cart container to be available
    const cartContainer = document.querySelector('.header-cart');
    if (!cartContainer) {
        // Retry after a short delay if navigation isn't ready
        setTimeout(setupLangSwitcher, 500);
        return;
    }

    // Check if switcher already exists to avoid duplicates
    if (document.querySelector('.custom-lang-switcher')) return;

    const switcher = document.createElement('div');
    switcher.className = 'custom-lang-switcher';
    switcher.innerHTML = `
        <div class="lang-dropdown">
            <button class="lang-dropbtn">
                <i class='bx bx-globe'></i> <span id="current-lang-text">English</span> <i class='bx bx-chevron-down'></i>
            </button>
            <div class="lang-dropdown-content">
                <a href="#" data-lang="en"><img src="https://flagcdn.com/w20/gb.png" style="width:18px;height:12px;object-fit:cover;border-radius:2px" alt="EN"> English</a>
                <a href="#" data-lang="ar"><img src="https://flagcdn.com/w20/ae.png" style="width:18px;height:12px;object-fit:cover;border-radius:2px" alt="AR"> العربية</a>
            </div>
        </div>
    `;
    // Insert before the cart icon
    cartContainer.insertBefore(switcher, cartContainer.firstChild);

    const currentLangText = switcher.querySelector('#current-lang-text');
    const links = switcher.querySelectorAll('.lang-dropdown-content a');

    links.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const lang = link.getAttribute('data-lang');
            const originalBtns = document.querySelectorAll('.language-btn');
            originalBtns.forEach(btn => {
                const btnText = btn.textContent.trim().toLowerCase();
                if (lang === 'en' && (btnText === 'english' || btnText.includes('en'))) {
                    btn.click();
                    currentLangText.textContent = 'English';
                } else if (lang === 'ar' && (btnText === 'arabic' || btnText.includes('ar') || btnText.includes('عرب'))) {
                    btn.click();
                    currentLangText.textContent = 'العربية';
                }
            });
        });
    });

    // Auto-sync with the active state from React
    setInterval(() => {
        const activeBtn = document.querySelector('.language-btn.active');
        if (activeBtn) {
            const text = activeBtn.textContent.trim().toLowerCase();
            if (text === 'english' || text.includes('en')) {
                currentLangText.textContent = 'English';
            } else {
                currentLangText.textContent = 'العربية';
            }
        }
    }, 1000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupLangSwitcher);
  } else {
    setupLangSwitcher();
  }
})();

    for (var i=0;i<Math.min(8, trend.length); i++){ var p=trend[i]; var link='/product/'+(p.slug||p.id); var price=priceOf(p)+(cfg.currencyPrefix==='$'?'$':cfg.currencyPrefix); html += '<div class="bracelets-card"><a href="'+link+'" style="text-decoration:none;color:inherit;display:block;"><img src="'+imgOf(p)+'" alt="'+(p.name||'Product')+'"><div class="bracelets-details"><p class="title">'+(p.name||'')+'</p><p class="price">'+price+'</p></div></a></div>'; }
    g.innerHTML = html;
  }
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', load); else load();
})();
</script></body></html>
